<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>G&G Admin Manager</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f23; color: #fff; font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
#login { text-align: center; }
#login h1 { color: #4ecca3; margin-bottom: 20px; }
#login input { padding: 10px; font-size: 24px; width: 200px; text-align: center; background: #1a1a2e; border: 2px solid #4ecca3; color: #fff; border-radius: 5px; outline: none; letter-spacing: 8px; }
#login input:focus { border-color: #ffcc00; }
#login .error { color: #ff4444; margin-top: 10px; font-size: 14px; }
#login button { margin-top: 15px; padding: 10px 30px; font-size: 16px; background: #4ecca3; color: #000; border: none; border-radius: 5px; cursor: pointer; }
#login button:hover { background: #3dbb92; }
#dashboard { display: none; width: 100%; height: 100vh; padding: 20px; }
#dashboard h1 { color: #4ecca3; margin-bottom: 20px; }
.tabs { display: flex; gap: 10px; margin-bottom: 20px; }
.tab { padding: 8px 20px; background: #1a1a2e; border: 1px solid #333; color: #aaa; cursor: pointer; border-radius: 4px; }
.tab.active { border-color: #4ecca3; color: #4ecca3; }
.tab-content { display: none; }
.tab-content.active { display: block; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #1a1a2e; }
th { background: #1a1a2e; color: #4ecca3; position: sticky; top: 0; }
tr:hover { background: #1a1a2e55; }
tr:nth-child(even) { background: #0d0d1e; }
button.danger { background: #ff4444; color: #fff; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; }
button.danger:hover { background: #cc3333; }
.edit-input { background: #2d2d44; border: 1px solid #555; color: #fff; padding: 4px 8px; border-radius: 3px; width: 80px; }
.edit-btn { background: #4ecca3; color: #000; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; margin-left: 4px; }
.edit-btn:hover { background: #3dbb92; }
.scroll { max-height: calc(100vh - 140px); overflow-y: auto; }
.status { margin-top: 10px; padding: 8px; border-radius: 4px; display: none; }
.status.good { display: block; background: #1a3a1a; color: #4ecca3; }
.status.bad { display: block; background: #3a1a1a; color: #ff4444; }
</style>
</head>
<body>
<div id="login">
  <h1>Admin Manager</h1>
  <input id="codeInput" type="text" maxlength="6" placeholder="000000" autofocus>
  <div class="error" id="loginError"></div>
  <button onclick="verify()">Enter</button>
</div>

<div id="dashboard">
  <h1>G&G Admin Manager</h1>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('users')">Users</div>
    <div class="tab" onclick="switchTab('servers')">Servers</div>
  </div>
  <div id="tab-users" class="tab-content active">
    <div class="scroll"><table><thead><tr><th>Username</th><th>Auth Type</th><th>Cash</th><th>Discord</th><th>Actions</th></tr></thead><tbody id="usersBody"></tbody></table></div>
  </div>
  <div id="tab-servers" class="tab-content">
    <div class="scroll"><table><thead><tr><th>Name</th><th>Type</th><th>Owner</th><th>Players</th><th>Actions</th></tr></thead><tbody id="serversBody"></tbody></table></div>
  </div>
  <div class="status" id="status"></div>
</div>

<script>
let currentTab = 'users';

function verify() {
  const code = document.getElementById('codeInput').value;
  document.getElementById('loginError').textContent = '';
  window.adminAPI.verifyCode(code).then(r => {
    if (r.success) {
      document.getElementById('login').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadUsers();
      loadServers();
    } else {
      document.getElementById('loginError').textContent = 'Incorrect code';
    }
  });
}

document.getElementById('codeInput').addEventListener('keydown', e => { if (e.key === 'Enter') verify(); });

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${tab === 'users' ? 1 : 2})`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

function status(msg, good) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status ' + (good ? 'good' : 'bad');
  setTimeout(() => { s.className = 'status'; }, 3000);
}

function loadUsers() {
  window.adminAPI.getUsers().then(users => {
    const tbody = document.getElementById('usersBody');
    tbody.innerHTML = users.map(u => `<tr>
      <td>${u.username || '?'}</td>
      <td>${u.auth_type || '?'}</td>
      <td><input class="edit-input" id="cash-${u.id}" value="${u.cash ?? 100}"><button class="edit-btn" onclick="updateCash('${u.id}')">Set</button></td>
      <td>${u.discord_username || '-'}</td>
      <td><button class="danger" onclick="deleteUser('${u.id}', '${u.username || '?'}')">Delete</button></td>
    </tr>`).join('');
  });
}

function updateCash(userId) {
  const val = parseInt(document.getElementById('cash-' + userId).value, 10);
  if (isNaN(val)) return;
  window.adminAPI.updateUser(userId, { cash: val }).then(r => {
    status(r.success ? 'Cash updated' : 'Failed: ' + r.error, r.success);
  });
}

function deleteUser(userId, username) {
  if (!confirm(`Delete ${username}?`)) return;
  window.adminAPI.deleteUser(userId).then(r => {
    status(r.success ? 'User deleted' : 'Failed: ' + r.error, r.success);
    loadUsers();
  });
}

function loadServers() {
  window.adminAPI.getServers().then(servers => {
    const tbody = document.getElementById('serversBody');
    tbody.innerHTML = servers.map(s => `<tr>
      <td>${s.name || 'Unnamed'}</td>
      <td>${s.type || '?'}</td>
      <td>${s.owner_name || '?'}</td>
      <td>${s.player_data?.length || 0}/${s.max_players || 8}</td>
      <td><button class="danger" onclick="deleteServer('${s.id}', '${(s.name || '?').replace(/'/g, "\\'")}')">Delete</button></td>
    </tr>`).join('');
  });
}

function deleteServer(serverId, name) {
  if (!confirm(`Delete server "${name}"?`)) return;
  window.adminAPI.deleteServer(serverId).then(r => {
    status(r.success ? 'Server deleted' : 'Failed: ' + r.error, r.success);
    loadServers();
  });
}
</script>
</body>
</html>
