<!DOCTYPE html>
<html>
<head><title>Authentication</title></head>
<body style="display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#1a1a2e;color:#fff;font-family:Arial;flex-direction:column;">
  <h2>Authentication successful!</h2>
  <p>Returning to the game...</p>
  <p id="status" style="color:#aaa;">Processing...</p>
  <script>
    var hash = window.location.hash;
    var params = new URLSearchParams(hash.replace('#', '?'));
    var accessToken = params.get('access_token');
    if (accessToken) {
      if (window.opener) {
        window.opener.postMessage({ type: 'supabase-auth', hash: hash }, window.location.origin);
        document.getElementById('status').textContent = 'Session transferred.';
        setTimeout(function() { window.close(); }, 2000);
      } else {
        try {
          localStorage.setItem('gag_discord_hash', hash);
          document.getElementById('status').textContent = 'Stored session. Redirecting...';
          var base = window.location.pathname.replace(/\/auth\/callback\.html$/, '') || '/';
          setTimeout(function() { window.location.href = base; }, 1500);
        } catch(e) {
          document.getElementById('status').textContent = 'Error: ' + e.message;
        }
      }
    } else {
      document.getElementById('status').textContent = 'No session found. Try again.';
    }
  </script>
</body>
</html>
