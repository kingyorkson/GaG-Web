name: Build iOS IPA

on:
  push:
    branches: [ios-build]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1.0'

      - name: Build unsigned .app
        run: |
          cd ios
          xcodebuild build \
            -project "G&G Mobile.xcodeproj" \
            -scheme "G&G Mobile" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/G\&G\ Mobile.app Payload/
          zip -r G_Mobile.ipa Payload/
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: G_Mobile.ipa
          path: G_Mobile.ipa
